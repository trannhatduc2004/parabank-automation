name: Parabank Automation Testing CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Automation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Parabank
        run: |
          docker pull parasoft/parabank
          docker run -d -p 8080:8080 --name parabank parasoft/parabank
          echo "Waiting for Parabank to start..."
          sleep 30
          npx wait-on http://localhost:8080/parabank/index.htm --timeout 120000

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          BASE_URL: http://localhost:8080/parabank
          API_URL: http://localhost:8080/parabank/services/bank
          TEST_USER: john
          TEST_PASSWORD: demo

      - name: Run E2E tests
        run: npx playwright test --project=chromium --project=firefox --project=webkit
        env:
          BASE_URL: http://localhost:8080/parabank
          API_URL: http://localhost:8080/parabank/services/bank
          TEST_USER: john
          TEST_PASSWORD: demo
          
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Performance Tests
        run: |
          k6 run src/performance/load-test.js
        continue-on-error: true

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: k6-results/
          retention-days: 7

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: reports/html/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7