name: Parabank Automation Testing CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Automation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Parabank
        run: |
          docker pull parasoft/parabank
          docker run -d -p 8080:8080 --name parabank parasoft/parabank
          echo "Waiting for Parabank to start..."
          sleep 30
          npx wait-on http://localhost:8080/parabank/index.htm --timeout 120000

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          BASE_URL: http://localhost:8080/parabank
          API_URL: http://localhost:8080/parabank/services/bank
          TEST_USER: john
          TEST_PASSWORD: demo

      - name: Run E2E tests
        run: npx playwright test --project=chromium --project=firefox --project=webkit
        env:
          BASE_URL: http://localhost:8080/parabank
          API_URL: http://localhost:8080/parabank/services/bank
          TEST_USER: john
          TEST_PASSWORD: demo

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: reports/html/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7